<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alineación · Dir. Planeación y Procesos · UNIMINUTO</title>
<style>
  @import url("https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap");
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
  body{background:#0d1b0d;font-family:"Barlow",sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;overflow:hidden}
  #stage{width:720px;height:640px;background:linear-gradient(170deg,#0d2e10 0%,#155218 35%,#1a6620 65%,#0d2e10 100%);position:relative;overflow:hidden;border-radius:20px;box-shadow:0 0 80px rgba(0,0,0,.8)}
  #field-svg{position:absolute;inset:0;width:100%;height:100%;opacity:.18}
  #flash{position:absolute;inset:0;background:white;opacity:0;z-index:50;pointer-events:none;border-radius:20px}
  #flash.on{animation:fl .35s ease-out forwards}
  @keyframes fl{0%{opacity:.75}100%{opacity:0}}

  /* Header */
  #header{position:absolute;top:0;left:0;right:0;text-align:center;padding:14px 0 8px;z-index:20;opacity:0;transition:opacity .6s}
  #header.vis{opacity:1}
  #header .sub{font-family:"Barlow Condensed",sans-serif;font-size:11px;letter-spacing:4px;color:rgba(255,215,0,.75);text-transform:uppercase}
  #header .title{font-family:"Barlow Condensed",sans-serif;font-size:22px;font-weight:800;color:#fff;letter-spacing:2px;text-transform:uppercase;line-height:1.1}

  /* DT Card */
  #dt-card{
    position:absolute;
    top:14px;left:14px;
    z-index:25;
    display:flex;
    align-items:center;
    gap:8px;
    background:rgba(0,0,0,.55);
    border:1.5px solid #FFD700;
    border-radius:12px;
    padding:6px 10px 6px 6px;
    opacity:0;
    transition:opacity .6s, box-shadow .2s;
    cursor:pointer;
    backdrop-filter:blur(4px);
  }
  #dt-card.vis{opacity:1}
  #dt-card:hover{box-shadow:0 0 18px rgba(255,215,0,.5)}
  #dt-photo{
    width:52px;height:62px;
    border-radius:8px;
    overflow:hidden;
    border:2px solid #FFD700;
    background:rgba(255,255,255,.06);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    flex-shrink:0;
  }
  #dt-photo img{width:100%;height:100%;object-fit:cover;display:block}
  #dt-placeholder{
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    width:100%;height:100%;
    gap:2px;
  }
  #dt-placeholder svg{opacity:.45}
  #dt-placeholder span{font-size:8px;color:rgba(255,215,0,.5);letter-spacing:.5px;font-family:"Barlow Condensed",sans-serif;text-transform:uppercase}
  #dt-info{}
  #dt-badge{font-family:"Barlow Condensed",sans-serif;font-size:9px;letter-spacing:2px;color:rgba(255,215,0,.7);text-transform:uppercase;margin-bottom:2px}
  #dt-name{font-family:"Barlow Condensed",sans-serif;font-size:14px;font-weight:700;color:#fff;text-transform:uppercase;letter-spacing:.5px;line-height:1.1;white-space:nowrap}

  /* Reveal */
  #reveal{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:40;text-align:center;pointer-events:none}
  #rc{width:180px;border-radius:14px;overflow:hidden;border:3px solid #FFD700;box-shadow:0 0 50px rgba(255,215,0,.5),0 0 100px rgba(255,215,0,.15);opacity:0;transform:scale(.2) rotate(-8deg)}
  #rc img{width:100%;display:block}
  #rc.show{animation:rshow .55s cubic-bezier(.34,1.56,.64,1) forwards}
  #rc.hide{animation:rhide .3s ease-in forwards}
  @keyframes rshow{0%{opacity:0;transform:scale(.2) rotate(-8deg)}65%{opacity:1;transform:scale(1.06) rotate(1deg)}100%{opacity:1;transform:scale(1) rotate(0)}}
  @keyframes rhide{0%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(.4) translateY(20px)}}
  #rname{margin-top:10px;background:rgba(0,0,0,.8);border:1px solid rgba(255,215,0,.5);border-radius:30px;padding:6px 18px;display:inline-block;opacity:0;transition:opacity .3s}
  #rname .n{font-family:"Barlow Condensed",sans-serif;font-size:17px;font-weight:700;color:#FFD700;letter-spacing:1px;text-transform:uppercase}
  #rname .r{font-size:11px;color:rgba(255,255,255,.7);letter-spacing:1px}

  /* Fichas campo */
  .fc{position:absolute;width:72px;border-radius:9px;overflow:hidden;border:2.5px solid #FFD700;box-shadow:0 6px 20px rgba(0,0,0,.6),0 0 12px rgba(255,215,0,.3);opacity:0;transform:scale(0) translateY(-15px);z-index:15;cursor:pointer;transition:box-shadow .2s}
  .fc:hover{box-shadow:0 6px 20px rgba(0,0,0,.6),0 0 26px rgba(255,215,0,.75)}
  .fc img{width:100%;display:block}
  .fc.placed{animation:place .45s cubic-bezier(.34,1.56,.64,1) forwards}
  @keyframes place{0%{opacity:0;transform:scale(0) translateY(-20px)}70%{opacity:1;transform:scale(1.08) translateY(-4px)}100%{opacity:1;transform:scale(1) translateY(0)}}
  .fc-label{position:absolute;bottom:-18px;left:50%;transform:translateX(-50%);white-space:nowrap;font-family:"Barlow Condensed",sans-serif;font-size:10px;font-weight:700;color:#FFD700;letter-spacing:.5px;text-transform:uppercase;text-shadow:0 1px 4px rgba(0,0,0,.9);pointer-events:none}

  #prog{position:absolute;bottom:0;left:0;height:4px;background:#FFD700;width:0%;transition:width .5s ease;z-index:30;border-radius:0 2px 0 0}
  #footer{position:absolute;bottom:14px;left:0;right:0;text-align:center;z-index:20;opacity:0;transition:opacity 1s}
  #footer.vis{opacity:1}
  #footer .ft{font-family:"Barlow Condensed",sans-serif;font-size:11px;letter-spacing:4px;color:rgba(255,215,0,.65);text-transform:uppercase}
  #footer .fb{font-family:"Barlow Condensed",sans-serif;font-size:18px;font-weight:700;color:#fff;letter-spacing:2px}
  #start{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:60;background:#FFD700;color:#0d2e10;border:none;padding:16px 40px;border-radius:40px;font-family:"Barlow Condensed",sans-serif;font-size:20px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;box-shadow:0 6px 30px rgba(255,215,0,.5);transition:transform .15s,box-shadow .15s}
  #start:hover{transform:translate(-50%,-50%) scale(1.06);box-shadow:0 8px 40px rgba(255,215,0,.7)}

  /* Modal zoom */
  #modal{position:absolute;inset:0;z-index:80;background:rgba(0,0,0,.78);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s;border-radius:20px}
  #modal.open{opacity:1;pointer-events:all}
  #modal-inner{position:relative;text-align:center;transform:scale(.7);transition:transform .3s cubic-bezier(.34,1.56,.64,1)}
  #modal.open #modal-inner{transform:scale(1)}
  #modal-card{width:240px;border-radius:16px;overflow:hidden;border:3px solid #FFD700;box-shadow:0 0 60px rgba(255,215,0,.5)}
  #modal-card img{width:100%;display:block}
  #modal-card .modal-placeholder{width:100%;height:290px;background:rgba(255,255,255,.05);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px}
  #modal-card .modal-placeholder svg{opacity:.3}
  #modal-card .modal-placeholder span{font-family:"Barlow Condensed",sans-serif;font-size:13px;color:rgba(255,215,0,.5);letter-spacing:2px;text-transform:uppercase}
  #modal-name{margin-top:12px;background:rgba(0,0,0,.85);border:1px solid rgba(255,215,0,.5);border-radius:30px;padding:8px 20px;display:inline-block}
  #modal-name .mn{font-family:"Barlow Condensed",sans-serif;font-size:19px;font-weight:700;color:#FFD700;letter-spacing:1px;text-transform:uppercase}
  #modal-name .mr{font-size:12px;color:rgba(255,255,255,.75);letter-spacing:1px}
  #modal-badge{margin-top:6px;display:inline-block;background:rgba(255,215,0,.12);border:1px solid rgba(255,215,0,.3);border-radius:20px;padding:3px 14px;font-family:"Barlow Condensed",sans-serif;font-size:11px;letter-spacing:2px;color:rgba(255,215,0,.7);text-transform:uppercase}
  #modal-close{margin-top:10px;display:inline-block;background:rgba(255,215,0,.15);border:1px solid rgba(255,215,0,.4);color:#FFD700;padding:6px 20px;border-radius:20px;font-family:"Barlow Condensed",sans-serif;font-size:13px;letter-spacing:2px;cursor:pointer;text-transform:uppercase;transition:background .2s}
  #modal-close:hover{background:rgba(255,215,0,.3)}


  #muteBtn{
  position:absolute;
  top:14px;
  right:14px;
  z-index:70;
  background:rgba(0,0,0,.55);
  border:1.5px solid #FFD700;
  color:#FFD700;
  width:42px;
  height:42px;
  border-radius:50%;
  font-size:18px;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  backdrop-filter:blur(4px);
  transition:all .2s;
}

#muteBtn:hover{
  background:rgba(255,215,0,.2);
  transform:scale(1.1);
}
</style>
</head>
<body>
<div id="stage">

<svg id="field-svg" viewBox="0 0 720 640" xmlns="http://www.w3.org/2000/svg">
  <rect x="60" y="28" width="600" height="584" fill="none" stroke="white" stroke-width="2"/>
  <line x1="60" y1="320" x2="660" y2="320" stroke="white" stroke-width="1.5"/>
  <circle cx="360" cy="320" r="75" fill="none" stroke="white" stroke-width="1.5"/>
  <circle cx="360" cy="320" r="4" fill="white"/>
  <rect x="210" y="28" width="300" height="115" fill="none" stroke="white" stroke-width="1.5"/>
  <rect x="285" y="28" width="150" height="55" fill="none" stroke="white" stroke-width="1.5"/>
  <rect x="210" y="497" width="300" height="115" fill="none" stroke="white" stroke-width="1.5"/>
  <rect x="285" y="557" width="150" height="55" fill="none" stroke="white" stroke-width="1.5"/>
  <circle cx="360" cy="115" r="3" fill="white"/>
  <circle cx="360" cy="525" r="3" fill="white"/>
  <path d="M60,28 Q78,28 78,46" fill="none" stroke="white" stroke-width="1.5"/>
  <path d="M660,28 Q642,28 642,46" fill="none" stroke="white" stroke-width="1.5"/>
  <path d="M60,612 Q78,612 78,594" fill="none" stroke="white" stroke-width="1.5"/>
  <path d="M660,612 Q642,612 642,594" fill="none" stroke="white" stroke-width="1.5"/>
</svg>

<div id="flash"></div>

<div id="header">
  <div class="sub">UNIMINUTO · Sede Bogotá</div>
  <div class="title">Dir. Planeación y Procesos</div>
</div>

<!-- DT Card esquina superior izquierda -->

<div id="dt-card">

  <div id="dt-photo">
    <img src="Rector.png" alt="Jefferson Arias">
  </div>

  <div id="dt-info">
    <div id="dt-badge">Rector</div>
    <div id="dt-name">Jefferson<br>Arias</div>
  </div>

</div>



<div id="reveal">
  <div id="rc"><img id="rci" src="" alt=""></div>
  <div id="rname">
    <div class="n" id="rn"></div>
    <div class="r" id="rr"></div>
  </div>
</div>
<div class="fc" id="fc0" style="left:calc(50% - 36px);top:8%;"><img src="Omar.png" alt="Omar Ricaurte"></div>
  <div class="fc" id="fc1" style="left:calc(19% - 36px);top:27%;"><img src="Karol.png" alt="Karol Muñoz"></div>
    <div class="fc" id="fc2" style="left:calc(50% - 36px);top:27%;"><img src="Carlos.png" alt="Carlos Valero"></div>
      <div class="fc" id="fc3" style="left:calc(81% - 36px);top:27%;"><img src="Alfredo.png" alt="Alfredo Ávila"></div>
        <div class="fc" id="fc4" style="left:calc(32% - 36px);top:50%;"><img src="Paula.png" alt="Paula Blanco"></div>
          <div class="fc" id="fc5" style="left:calc(68% - 36px);top:50%;"><img src="Diego.png" alt="Diego Villarreal"></div>
            <div class="fc" id="fc6" style="left:calc(35% - 36px);top:72%;"><img src="Incognita.png" alt="Incognita"></div>


<div id="footer">
  <div class="ft">Alineación oficial 2026</div>
  <div class="fb">El equipo está listo</div>
</div>

<div id="prog"></div>
<button id="start">INICIAR ALINEACION</button>
<button id="muteBtn">🔊</button>

<!-- Modal zoom -->
<div id="modal">
  <div id="modal-inner">
    <div id="modal-card">
      <img id="modal-img" src="" alt="" style="display:none">
      <div class="modal-placeholder" id="modal-ph" style="display:none">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#FFD700" stroke-width="1.2">
          <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
        </svg>
        <span>Foto próximamente</span>
      </div>
    </div>
    <div id="modal-name">
      <div class="mn" id="modal-nm"></div>
      <div class="mr" id="modal-rl"></div>
    </div>
    <audio id="bgMusic" loop>
  <source src="musica.mp3" type="audio/mpeg">
</audio>
    <div id="modal-badge" id="modal-bg"></div><br>
    <button id="modal-close">✕ Cerrar</button>
  </div>
</div>

</div>

<script>
const players = [
  {name:"JEFFERSON ARIAS",role:"Rector",img:"Rector.png"},
  {name:"OMAR RICAURTE",role:"Director de Planeaci\u00f3n y Procesos",img:"Omar.png"},
  {name:"KAROL MU\u00d1OZ",role:"Coordinadora de Calidad y Procesos",img:"Karol.png"},
  {name:"CARLOS VALERO",role:"Coord. Procesos de Informaci\u00f3n",img:"Carlos.png"},
  {name:"ALFREDO \u00c1VILA",role:"Coord. Inteligencia de Negocios",img:"Alfredo.png"},
  {name:"PAULA BLANCO",role:"Prof. Desarrollo Estrat\u00e9gico",img:"Paula.png"},
  {name:"DIEGO VILLARREAL",role:"Prof. Desarrollo Estrat\u00e9gico",img:"Diego.png"},
  {name:"¿NOMBRE?",role:"Prof. Desarrollo Estrat\u00e9gico",img:"Incognita.png"},

];

const rc=document.getElementById("rc"),rci=document.getElementById("rci"),rname=document.getElementById("rname"),rn=document.getElementById("rn"),rr=document.getElementById("rr"),flash=document.getElementById("flash"),prog=document.getElementById("prog"),header=document.getElementById("header"),footer=document.getElementById("footer"),startBtn=document.getElementById("start");
const modal=document.getElementById("modal"),modalImg=document.getElementById("modal-img"),modalPh=document.getElementById("modal-ph"),modalNm=document.getElementById("modal-nm"),modalRl=document.getElementById("modal-rl"),modalClose=document.getElementById("modal-close");
const dtCard=document.getElementById("dt-card");
const sleep=ms=>new Promise(r=>setTimeout(r,ms));
let animDone=false;
const bgMusic = document.getElementById("bgMusic");

const muteBtn = document.getElementById("muteBtn");
let isMuted = false;

function openModal(name, role, imgSrc, isDT){
  modalNm.textContent=name;
  modalRl.textContent=role;
  if(imgSrc){
    modalImg.src=imgSrc;
    modalImg.style.display="block";
    modalPh.style.display="none";
  } else {
    modalImg.style.display="none";
    modalPh.style.display="flex";
  }
  modal.classList.add("open");
}

function bindCard(fcEl, p){
  fcEl.addEventListener("click",()=>{ if(!animDone) return; openModal(p.name, p.role, p.img, false); });
}

// DT siempre clickeable

dtCard.addEventListener("click", () => {
  openModal("JEFFERSON ARIAS", "Rector", "Rector.png", true);
});


modalClose.addEventListener("click",()=>modal.classList.remove("open"));
modal.addEventListener("click",(e)=>{ if(e.target===modal) modal.classList.remove("open"); });


muteBtn.addEventListener("click", () => {
  isMuted = !isMuted;

  bgMusic.muted = isMuted;

  // Cambiar icono
  muteBtn.textContent = isMuted ? "🔇" : "🔊";
});


async function run(){
  startBtn.style.display="none";

  // ✅ Reproducir música
  bgMusic.currentTime = 0;
  bgMusic.play().catch(()=>{});

  header.classList.add("vis");
  await sleep(300);
  dtCard.classList.add("vis");
  await sleep(300);
  for(let i=0;i<players.length;i++){
    const p=players[i];
    flash.classList.remove("on"); void flash.offsetWidth; flash.classList.add("on");
    await sleep(80);
    rci.src=p.img; rn.textContent=p.name; rr.textContent=p.role; rname.style.opacity="0";
    rc.classList.remove("show","hide"); void rc.offsetWidth; rc.classList.add("show");
    await sleep(300); rname.style.opacity="1";
    await sleep(1500);
    rname.style.opacity="0"; rc.classList.remove("show"); rc.classList.add("hide");
    await sleep(320);
    const fcEl = document.getElementById("fc" + i);
    fcEl.classList.add("placed");
    bindCard(fcEl,p);
    prog.style.width=((i+1)/players.length*100)+"%";
    await sleep(500);
  }
  await sleep(400);
  footer.classList.add("vis");
  animDone=true;
}

startBtn.addEventListener("click",run);


</script>

</body>

</html>
